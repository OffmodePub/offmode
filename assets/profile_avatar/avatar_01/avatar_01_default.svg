<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(128 128) rotate(90) scale(128)">
      <stop stop-color="#111A5C"/>
      <stop offset="1" stop-color="#070B22"/>
    </radialGradient>

    <filter id="glowBlue" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="glowYellow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="glowPink" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <style>
      .blue { stroke: #35E6FF; filter: url(#glowBlue); }
      .yellow { stroke: #FFC93A; filter: url(#glowYellow); }
      .pink { stroke: #FF3BCB; filter: url(#glowPink); }
      .line {
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
        stroke-width: 6;
      }
    </style>
  </defs>

  <rect width="256" height="256" rx="28" fill="url(#bg)"/>

  <!-- hair -->
  <path class="line blue" d="M72 78
    C72 58, 88 44, 108 44
    C118 44, 126 48, 132 54
    C138 48, 146 44, 156 44
    C176 44, 192 58, 192 78
    L192 84
    C186 82, 182 82, 176 82
    C162 82, 148 82, 134 82
    C120 82, 106 82, 92 82
    C86 82, 78 82, 72 84
    Z"/>

  <!-- ears -->
  <path class="line blue" d="M71 112 C60 114, 60 132, 71 136"/>
  <path class="line blue" d="M185 112 C196 114, 196 132, 185 136"/>

  <!-- face -->
  <path class="line blue" d="M78 84
    L78 172
    C78 206, 101 224, 128 224
    C155 224, 178 206, 178 172
    L178 84"/>

  <!-- eyebrows -->
  <path class="line yellow" d="M96 96 L113 92"/>
  <path class="line yellow" d="M143 92 L160 96"/>

  <!-- eyes -->
  <circle class="line blue" cx="104" cy="116" r="10"/>
  <circle class="line blue" cx="152" cy="116" r="10"/>
  <circle class="line blue" cx="104" cy="116" r="2"/>
  <circle class="line blue" cx="152" cy="116" r="2"/>

  <!-- nose -->
  <path class="line yellow" d="M128 128 L128 129"/>

  <!-- mouth -->
  <path class="line pink" d="M103 151
    C111 168, 145 168, 153 151"/>

  <!-- subtle chin accent -->
  <path class="line pink" d="M114 165 C121 171, 135 171, 142 165" opacity="0.9"/>
</svg>
