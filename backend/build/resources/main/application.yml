spring:
  datasource:
    url: jdbc:h2:file:./offmode-db;AUTO_SERVER=TRUE    # 파일 기반 H2, 다중 연결 허용
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true                   # http://localhost:8080/h2-console 에서 DB 확인 가능
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update                # 스키마 자동 업데이트
    defer-datasource-initialization: true   # JPA 테이블 생성 후 data.sql 실행
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      mode: always                    # data.sql 항상 실행
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  # 운영 환경 (MySQL) 예시 — profile: prod 로 전환
  # datasource:
  #   url: jdbc:mysql://localhost:3306/offmode?serverTimezone=Asia/Seoul
  #   driver-class-name: com.mysql.cj.jdbc.Driver
  #   username: ${DB_USERNAME}
  #   password: ${DB_PASSWORD}

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:offmode-dev-secret-change-in-production-must-be-long-enough}
  expiration-days: 90

kakao:
  user-info-url: https://kapi.kakao.com/v2/user/me

apple:
  bundle-id: com.minnnj.offmode
  keys-url: https://appleid.apple.com/auth/keys

file:
  upload-dir: ./uploads

logging:
  level:
    com.offmode: DEBUG
