spring:
  datasource:
    url: jdbc:h2:file:./offmode-db;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      mode: never
  flyway:
    enabled: true
    locations:
      - classpath:db/migration/h2

offmode:
  security:
    cors:
      allowed-origin-patterns:
        - "*"
