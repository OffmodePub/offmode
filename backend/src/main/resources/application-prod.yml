spring:
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT:3306}/${DB_NAME}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&useSSL=false&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false
  sql:
    init:
      mode: never               # prod에서는 Flyway로 초기화/마이그레이션 관리
  flyway:
    enabled: true
    locations:
      - classpath:db/migration/mysql

offmode:
  security:
    cors:
      allowed-origins: ${CORS_ALLOWED_ORIGINS:}
